---
layout: default
---
<div class="page-shell">
  {% unless page.url == '/' %}
    {% include breadcrumbs.html %}
  {% endunless %}

  <article class="content-page">
    {% unless page.hide_title %}
      <header class="page-header">
        <h1>{{ page.title }}</h1>
        {% if page.summary %}
          <p class="standfirst">{{ page.summary }}</p>
        {% endif %}
      </header>
    {% endunless %}

    {{ content }}
  </article>
</div>
